packages:
  - 'packages/*'
  - 'themes/*'
  - 'examples/*'

# Catalog versioning keeps every workspace package on the same dependency
# versions. Packages reference these via `"catalog:dev"` etc. in their
# package.json. Mirrors Slidev's dev/frontend/prod split.
#
# Entries are added as each phase wires up the tools that need them; an entry
# here is inert until a package actually depends on it.
catalogs:
  # Build, lint, test, and type tooling shared across every package.
  dev:
    typescript: ^5.8.0
    '@types/node': ^24.0.0
    tsup: ^8.5.0
    vitest: ^3.0.0
    '@vitest/coverage-v8': ^3.0.0
    '@biomejs/biome': ^2.0.0
    husky: ^9.1.0
    lint-staged: ^15.2.0
    vite: ^6.0.0
    jsdom: ^25.0.0
    '@playwright/test': ^1.48.0
    '@types/react': ^19.0.0
    '@types/react-dom': ^19.0.0
    '@types/katex': ^0.16.7
    '@types/plantuml-encoder': ^1.4.2
    '@types/recordrtc': ^5.6.15

  # Browser / Astro-facing runtime dependencies (Phase 03+).
  frontend:
    astro: ^5.0.0
    nanostores: ^0.11.0
    tinykeys: ^2.1.0
    fitty: ^2.4.0
    unplugin-icons: ^0.21.0
    '@iconify-json/carbon': ^1.2.0
    '@astrojs/mdx': ^4.3.0
    '@astrojs/react': ^4.3.0
    react: ^19.0.0
    react-dom: ^19.0.0
    # Code rendering (Phase 08): Shiki + Magic Move + Twoslash.
    shiki: ^4.3.0
    '@shikijs/rehype': ^4.3.0
    '@shikijs/transformers': ^4.3.0
    '@shikijs/twoslash': ^4.3.0
    '@shikijs/magic-move': ^4.3.0
    lz-string: ^1.5.0
    chokidar: ^5.0.0
    # Loads the author's `setup/shiki.ts` (TS config) at build time.
    esbuild: ^0.25.0
    # Math + diagrams (Phase 09).
    katex: ^0.17.0
    remark-math: ^6.0.0
    mermaid: ^11.16.0
    plantuml-encoder: ^1.4.0
    # Presenter mode (Phase 10).
    react-hotkeys-hook: ^5.3.0
    cmdk: ^1.1.0
    # v2 line: the documented PanelGroup/autoSaveId API (v4 renamed to Group/Separator).
    react-resizable-panels: ^2.1.9
    # Drawing + recording (Phase 11). drauu is vanilla TS (wired to a ref);
    # recordrtc + the WebM duration fixer are lazy-imported only when recording starts.
    drauu: ^1.0.0
    recordrtc: ^5.6.2
    '@fix-webm-duration/fix': ^1.0.1

  # Non-UI runtime libraries used by parser / MCP / CLI (Phase 02+).
  prod:
    zod: ^4.0.0
    yaml: ^2.0.0
    citty: ^0.1.6
    picocolors: ^1.1.0
    unified: ^11.0.0
    remark-parse: ^11.0.0
    remark-rehype: ^11.0.0
    remark-gfm: ^4.0.0
    rehype-stringify: ^10.0.0
    unist-util-visit: ^5.0.0
    # Mobile remote + sync gateway (Phase 11). Hono serves /entry and the
    # /__astro-slides/sync WebSocket in the dev server; uqr prints the LAN QR code.
    hono: ^4.12.0
    '@hono/node-ws': ^1.3.0
    # node-ws 1.3 peers on node-server v1.19, not v2.
    '@hono/node-server': ^1.19.14
    uqr: ^0.1.2
    # Web export (Phase 12). pdf-lib merges per-slide PDFs; outline-pdf adds a TOC;
    # jszip packages the offline HTML bundle; listr2 drives the CLI progress UI.
    pdf-lib: ^1.17.1
    '@lillallol/outline-pdf': ^4.0.0
    jszip: ^3.10.1
    listr2: ^10.0.0
    # PPTX export (Phase 13, ADR-0007) — editable OOXML via PptxGenJS.
    pptxgenjs: ^4.0.0
