name: Release

# Changesets release flow. On push to main, if there are pending changesets, this opens (or
# updates) a "Version Packages" PR. When that PR merges, the same job runs `changeset publish`
# to push the packages to npm and tag the GitHub release.
#
# Publishing requires an NPM_TOKEN repo secret and the @astro-slides scope claimed on npm.
# Until those exist the version PR still works; only the publish step no-ops/fails.
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  # Required for npm provenance attestation on publish.
  id-token: write

jobs:
  release:
    name: Version / publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # The MCP server ships a bundled dist; build it before a potential publish.
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets reads NPM_TOKEN specifically to pick token auth; without it, it
          # falls back to OIDC/trusted-publishing, which can't first-publish scoped
          # packages before the org + a per-package trusted publisher exist. Set both:
          # NPM_TOKEN for changesets' auth decision, NODE_AUTH_TOKEN for the npm CLI .npmrc.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
