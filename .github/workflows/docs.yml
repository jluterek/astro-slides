name: Docs

# Builds the Starlight docs site and deploys it to GitHub Pages on every push to main.
# Pull requests build only (no deploy), so a broken docs build is caught before merge.
on:
  push:
    branches: [main]
  pull_request:

# Queue rather than cancel: cancelling a run mid-deploy can leave a superseded Pages
# deployment behind. Builds take ~30s, so queued runs cost little.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @astro-slides/docs-site build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy from main; PRs run the build job above for validation only.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        # The Pages service intermittently rejects a fresh deployment with
        # "Deployment failed, try again later." — the same artifact deploys cleanly
        # minutes later (verified: byte-identical artifacts, one failed, one served).
        # Take the service at its word: pause and retry once before failing the job.
        continue-on-error: true
      - name: Wait before retrying the deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: retry
        name: Retry Pages deployment
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
