name: Docs

# Builds the Starlight docs site and deploys it to GitHub Pages on every push to main.
# Pull requests build only (no deploy), so a broken docs build is caught before merge.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @astro-slides/docs-site build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    # Only deploy from main; PRs run the build job above for validation only.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
